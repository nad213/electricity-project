{% comment %}
Bandeau invitant un visiteur non connecté à se connecter ou s'inscrire
pour accéder à une fonctionnalité réservée (API, Chat).
{% endcomment %}
<div class="card">
    <div class="card-body text-center py-5">
        <div class="icon-box mb-3 mx-auto">
            <i class="ti ti-lock"></i>
        </div>
        <h3 class="mb-2 text-bright">Connexion requise</h3>
        <p class="text-muted mb-4 login-invite-text">
            Connectez-vous ou inscrivez-vous pour accéder à cette fonctionnalité.
        </p>
        <a href="{% url 'consommation:login' %}" class="btn btn-primary">
            <i class="ti ti-login me-2"></i>Se connecter ou s'inscrire
        </a>
    </div>
</div>
